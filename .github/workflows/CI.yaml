name: CI

on:
  push:
    tags:
      - "*"
    branches:
      - 'main'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-22.04, macos-15-intel, macos-latest]
        # os: [windows-latest, ubuntu-latest, macos-15-intel, macos-latest, windows-11-arm]
        include:
          - os: windows-latest
            build: BHYG-Windows.exe
            bdist_client: OSS-Windows
          - os: ubuntu-22.04
            build: BHYG-Linux
            bdist_client: OSS-Linux
          - os: macos-15-intel
            build: BHYG-macOS-Intel.bin
            bdist_client: OSS-Mac(Intel)
          - os: macos-latest
            build: BHYG-macOS-Apple_Silicon.bin
            bdist_client: OSS-Mac
          # - os: windows-11-arm
          #   build: BHYG-Windows-arm.exe
    runs-on: ${{ matrix.os }}
    env:
      version: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.13
          cache: 'pip'
          cache-dependency-path: |
            requirements*.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Cython
        run: pip install Cython

      - name: Nuitka Build
        uses: Nuitka/Nuitka-Action@main
        with:
          script-name: loader.py
          mode: onefile
          include-data-dir: ./locale=locale
          output-file: ${{ github.ref_name }}-${{ matrix.build }}
          include-package:
            sentry_sdk.integrations

      - name: Add executable attr
        run: chmod +x build/*
        if: matrix.os != 'windows'

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          archive: false
          path: build/${{ github.ref_name }}-${{ matrix.build }}

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: build/${{ github.ref_name }}-${{ matrix.build }}

      - name: Upload to BDist
        shell: bash
        env:
          BDIST_UPLOAD_URL: ${{ vars.BDIST_UPLOAD_URL || 'https://dist.rakuyoudesu.com/ci/upload' }}
          BDIST_UPLOAD_TOKEN: ${{ secrets.BDIST_UPLOAD_TOKEN }}
          BDIST_CLIENT: ${{ matrix.bdist_client }}
          BDIST_FILENAME: ${{ github.ref_name }}-${{ matrix.build }}
          BDIST_FILE: build/${{ github.ref_name }}-${{ matrix.build }}
        run: |
          curl --fail-with-body --show-error --silent --location \
            -X POST "$BDIST_UPLOAD_URL" \
            -H "Authorization: Bearer $BDIST_UPLOAD_TOKEN" \
            -F "client=$BDIST_CLIENT" \
            -F "filename=$BDIST_FILENAME" \
            -F "file=@$BDIST_FILE"
